name: Development Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-trigger-conditions:
    name: Validate Trigger Conditions
    runs-on: ubuntu-latest
    outputs:
      run_release: ${{ steps.check.outputs.run_release }}
      run_publish: ${{ steps.check.outputs.run_publish }}
    steps:
      - name: Evaluate workflow trigger
        id: check
        run: |
          echo "run_release=false" >> $GITHUB_OUTPUT
          echo "run_publish=false" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: only run release
            echo "run_release=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            commits_json='${{ toJson(github.event.commits) }}'
            commits_count=$(echo "$commits_json" | jq 'length')
            echo "🔍 Commit count: $commits_count"
            if [ "$commits_count" -eq 1 ]; then
              msg=$(echo "$commits_json" | jq -r '.[0].message')
              echo "🔍 Commit message: $msg"
              if [[ "$msg" =~ ^release\(.* ]]; then
                echo "run_release=true" >> $GITHUB_OUTPUT
                echo "run_publish=true" >> $GITHUB_OUTPUT
              fi
            fi
          fi

  generate-release:
    name: Generate Development Release
    needs: validate-trigger-conditions
    if: needs.validate-trigger-conditions.outputs.run_release == 'true'
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && 'production' || '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write
    timeout-minutes: 10
    steps:
      - name: Log Workflow Context
        run: |
          echo "::group::🔍 Workflow Execution Context"
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref Name: ${{ github.ref_name }}"
          echo "::endgroup::"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Changelog
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: dev.release-please-config.json
          manifest-file: dev.release-please-manifest.json

  publish:
    name: Test publish - Dev
    needs: [validate-trigger-conditions, generate-release]
    if: needs.validate-trigger-conditions.outputs.run_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish to Dev
        run: |
          echo "🚀 Test Publish Job: Completed"

  summary:
    name: Summary
    needs: [validate-trigger-conditions, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Add workflow summary and logs
        run: |
          run_release="${{ needs.validate-trigger-conditions.outputs.run_release }}"
          run_publish="${{ needs.validate-trigger-conditions.outputs.run_publish }}"

          if [ "$run_release" != "true" ]; then
            echo "🚫 Workflow skipped"
            echo "### 🚫 Workflow skipped" >> $GITHUB_STEP_SUMMARY
          elif [ "$run_release" = "true" ] && [ "$run_publish" != "true" ]; then
            echo "✅ Release job ran, publish skipped"
            echo "### ✅ Release job ran, publish skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Release and publish jobs ran"
            echo "### ✅ Release and publish jobs ran" >> $GITHUB_STEP_SUMMARY
          fi
