name: Development Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-trigger-conditions:
    name: Validate Trigger Conditions
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Evaluate workflow trigger
        id: check
        run: |
          echo "should_run=false" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            commits_count=$(jq '.commits | length' <<< '${{ toJson(github.event.commits) }}')
            if [ "$commits_count" -eq 1 ]; then
              msg=$(jq -r '.commits[0].message' <<< '${{ toJson(github.event.commits) }}')
              if [[ "$msg" =~ ^release\(.* ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
              fi
            fi
          fi

  generate-release:
    name: Generate Development Release
    if: needs.validate-trigger-conditions.outputs.should_run == 'true'
    permissions:
      contents: write
      actions: write
      pull-requests: write
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [validate-trigger-conditions]

    steps:
      - name: Log Workflow
        run: |
          echo "::group::🔍 Workflow Execution Context"
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref Name: ${{ github.ref_name }}"
          echo "::endgroup::"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Changelog
        id: release-changelog
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: dev.release-please-config.json
          manifest-file: dev.release-please-manifest.json

  publish:
    name: Test publish - Dev
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [validate-trigger-conditions, generate-release]
    if: needs.validate-trigger-conditions.outputs.should_run == 'true'
    steps:
      - name: Publish to Dev
        run: |
          sleep 10
          echo "Test Publish Job: Completed"
