name: Development Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate-trigger-conditions:
    name: Validate Trigger Conditions
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Evaluate workflow trigger
        id: check
        run: |
          echo "should_run=false" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            commits_json='${{ toJson(github.event.commits) }}'
            commits_count=$(echo "$commits_json" | jq 'length')
            echo "🔍 Commit count: $commits_count"
            if [ "$commits_count" -eq 1 ]; then
              msg=$(echo "$commits_json" | jq -r '.[0].message')
              echo "🔍 Commit message: $msg"
              if [[ "$msg" =~ ^release\(.* ]]; then
                echo "should_run=true" >> $GITHUB_OUTPUT
              fi
            fi
          fi

  generate-release:
    name: Generate Development Release
    needs: validate-trigger-conditions
    if: needs.validate-trigger-conditions.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      pull-requests: write
    timeout-minutes: 10
    steps:
      - name: Log Workflow Context
        run: |
          echo "::group::🔍 Workflow Execution Context"
          echo "Event: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Ref Name: ${{ github.ref_name }}"
          echo "::endgroup::"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Changelog
        id: release-changelog
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_PAT }}
          config-file: dev.release-please-config.json
          manifest-file: dev.release-please-manifest.json

  publish:
    name: Test publish - Dev
    needs: [validate-trigger-conditions, generate-release]
    if: needs.validate-trigger-conditions.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Publish to Dev
        run: |
          echo "🚀 Test Publish Job: Completed"

  summary:
    name: Summary
    needs: validate-trigger-conditions
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Add workflow summary
        run: |
          if [ "${{ needs.validate-trigger-conditions.outputs.should_run }}" != "true" ]; then
            echo "### 🚫 Workflow skipped" >> $GITHUB_STEP_SUMMARY
            echo "Conditions not met: only runs on workflow_dispatch or single commit starting with release(" >> $GITHUB_STEP_SUMMARY
            echo "ℹ️ All downstream jobs were skipped." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ Workflow completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "Release and publish jobs executed." >> $GITHUB_STEP_SUMMARY
